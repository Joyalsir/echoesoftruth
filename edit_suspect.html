{% extends 'admin/base.html' %}
{% block content %}

<div class="container mt-4">
    <div class="card shadow-lg p-4 mx-auto" style="max-width: 600px;">
        <h2 class="text-center text-primary mb-3">Edit Suspect</h2>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Name</label>
                    <input type="text" class="form-control form-control-sm" name="name" value="{{ suspect.name }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Age</label>
                    <input type="number" class="form-control form-control-sm" name="age" value="{{ suspect.age }}" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Address</label>
                <input type="text" class="form-control form-control-sm" name="address" value="{{ suspect.address }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Description</label>
                <textarea class="form-control form-control-sm" name="description" rows="3" required>{{ suspect.description }}</textarea>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Status</label>
                <select class="form-control form-control-sm" name="status">
                    <option value="Under Investigation" {% if suspect.status == "Under Investigation" %}selected{% endif %}>Under Investigation</option>
                    <option value="Arrested" {% if suspect.status == "Arrested" %}selected{% endif %}>Arrested</option>
                    <option value="Released" {% if suspect.status == "Released" %}selected{% endif %}>Released</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Suspect Image</label>
                <input type="file" class="form-control form-control-sm" name="image">
                {% if suspect.image %}
                <div class="text-center mt-2">
                    <img src="{{ suspect.image.url }}" alt="Suspect Image" class="rounded shadow-sm" width="100">
                </div>
                {% endif %}
            </div>

            <div class="text-center">
                <button type="submit" class="btn btn-primary btn-sm px-4">Update Suspect</button>
            </div>
        </form>
    </div>
</div>

{% endblock %}
