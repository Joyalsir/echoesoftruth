{% extends 'investigator/base.html' %}
{% load static %}
{% block content %}
<div class="container mt-4">
    <h2 class="text-center">Edit Investigator Profile</h2>
    <div class="card mx-auto p-4" style="max-width: 500px;">
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" class="form-control" value="{{ investigator.username }}" required>
            </div>
            
            <div class="form-group">
                <label>Name</label>
                <input type="text" name="name" class="form-control" value="{{ investigator.name }}" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" class="form-control" value="{{ investigator.email }}" required>
            </div>

            <div class="form-group">
                <label>Phone</label>
                <input type="text" name="phone" class="form-control" value="{{ investigator.phone }}" required>
            </div>

            <div class="form-group">
                <label>Address</label>
                <textarea name="address" class="form-control" required>{{ investigator.address }}</textarea>
            </div>

            <div class="form-group">
                <label>Profile Image</label><br>
                {% if investigator.image %}
                    <img src="{{ investigator.image.url }}" width="100" height="100" class="mb-2"><br>
                {% endif %}
                <input type="file" name="image" class="form-control-file">
            </div>

            <button type="submit" class="btn btn-success">Update Profile</button>
            <a href="{% url 'investigator_profile' %}" class="btn btn-secondary">Back</a>
        </form>
    </div>
</div>
{% endblock %}
