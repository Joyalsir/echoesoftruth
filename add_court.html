{% extends 'admin/base.html' %}
{% load static %}
{% block content %}
<div class="container mt-5">
    <h2 class="text-center mb-4">Add Court</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="form-group mb-3">
            <label>Court Name</label>
            <input type="text" name="court_name" class="form-control" required>
        </div>

        <div class="form-group mb-3">
            <label>Court Type</label>
            <input type="text" name="court_type" class="form-control" required>
        </div>

        <div class="form-group mb-3">
            <label>Judge Name</label>
            <input type="text" name="judge_name" class="form-control" required>
        </div>

        <div class="form-group mb-3">
            <label>Email</label>
            <input type="email" name="email" class="form-control" required>
        </div>

        <div class="form-group mb-3">
            <label>Phone</label>
            <input type="tel" name="phone" class="form-control" required>
        </div>

        <div class="form-group mb-3">
            <label>Address</label>
            <textarea name="address" class="form-control" required></textarea>
        </div>

        <div class="form-group mb-3">
            <label>Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>

        <div class="form-group mb-3">
            <label>Court Image</label>
            <input type="file" name="court_image" class="form-control">
        </div>

        <button type="submit" class="btn btn-primary w-100">Add Court</button>
    </form>
</div>
{% endblock %}
